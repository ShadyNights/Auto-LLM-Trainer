version: '3.8'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=${PGDATABASE:-traveler_db}
      - PGUSER=${PGUSER:-traveler_app_user}
      - PGPASSWORD=${PGPASSWORD:-secure_password}
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traveler_network
    restart: unless-stopped

  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=${PGDATABASE:-traveler_db}
      - POSTGRES_USER=${PGUSER:-traveler_app_user}
      - POSTGRES_PASSWORD=${PGPASSWORD:-secure_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-traveler_app_user} -d ${PGDATABASE:-traveler_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traveler_network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  traveler_network:
